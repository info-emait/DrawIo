<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
        <title>%VITE_APP_TITLE%</title>
        <link rel="icon" href="/img/favicon.ico" sizes="any" />
    </head>
    <body class="drawio-hub bolt-page v-scroll-auto flex-column bolt-page-grey">
        <div class="bolt-header flex-row flex-noshrink flex-start bolt-header-no-spacing-defined">
            <div class="bolt-header-content-area flex-row flex-grow flex-self-stretch">
                <div class="bolt-header-title-area flex-column flex-grow scroll-hidden">
                    <div class="bolt-header-title-row flex-row flex-baseline">
                        <div aria-level="1" class="bolt-header-title title-m l" role="heading">Draw.io</div>
                    </div>
                </div>
                <div class="flex-self-start bolt-header-commandbar bolt-button-group flex-row">
                    <div class="flex-self-start bolt-header-commandbar-button-group flex-row flex-center flex-grow scroll-hidden rhythm-horizontal-8">
                        <div class="bolt-header-command-item-button bolt-expandable-button inline-flex-row">
                            <button class="icon-only bolt-button bolt-icon-button enabled subtle icon-only bolt-focus-treatment" tabindex="0" type="button">
                                <span class="fluent-icons-enabled">
                                    <span aria-hidden="true" class="left-icon flex-noshrink fabric-icon medium ms-Icon--FullScreen"></span>
                                </span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="page-content">
            <div class="flex-row margin-top-16">
                TODO
            </div>
        </div>
        <script type="module" src="/src/hub/main.js"></script>
    </body>
</html>
